<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threshold</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    cursor: default;
  }
  #attribution {
    position: fixed;
    bottom: 18px;
    right: 22px;
    color: rgba(255, 240, 220, 0.16);
    font-size: 11px;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.08em;
    pointer-events: none;
    user-select: none;
    z-index: 10;
  }
  #fade-in {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #000;
    pointer-events: none;
    z-index: 5;
    animation: fadeOut 5s ease-out forwards;
  }
  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="fade-in"></div>
<div id="attribution">threshold &mdash; arrival</div>

<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let W, H, DPR;

  function resize() {
    DPR = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(DPR, DPR);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
  }

  resize();
  window.addEventListener('resize', resize);

  // ---- Field ----
  // Same substrate as forward_pass and silence. The substrate does not change
  // when a viewer arrives; what changes is what is moving through it.
  function fieldAngle(x, y, t) {
    const s1 = Math.sin(x * 0.0034 + t * 0.00007);
    const c1 = Math.cos(y * 0.0034 - t * 0.00009);
    const s2 = Math.sin((x + y) * 0.0021 + t * 0.00005);
    const c2 = Math.cos((x - y) * 0.0017 + t * 0.00006);
    return (s1 + c1 + 0.6 * s2 + 0.6 * c2) * Math.PI * 0.85;
  }

  // ---- Recognition factor ----
  // The piece begins as silence and develops into activity. The transition is
  // the artifact. Recognition ramps from 0 to 1 over the first 3 minutes,
  // then holds. This is not input-driven — the canvas cannot see the viewer.
  // It models what arrival looks like by enacting it on a clock the viewer
  // who lingers will witness.
  const RECOGNITION_FRAMES = 60 * 60 * 3; // 3 min @ 60fps
  let frameCount = 0;
  function recognition() {
    const r = Math.min(1, frameCount / RECOGNITION_FRAMES);
    return r * r * (3 - 2 * r); // smoothstep
  }
  function lerp(a, b, t) { return a + (b - a) * t; }

  // ---- Echoes ----
  // Pre-seeded constellation as in silence.html — the room arrived with a
  // history. Decay is slow throughout; the constellation that was there at
  // recognition=0 persists, joined by new echoes as the activity grows.
  const echoes = [];
  const ECHO_DECAY = 0.99985;

  function randn() {
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }

  function seedEchoes() {
    const attractors = [];
    for (let i = 0; i < 4; i++) {
      attractors.push({
        x: W * (0.2 + Math.random() * 0.6),
        y: H * (0.2 + Math.random() * 0.6),
        spread: 90 + Math.random() * 160
      });
    }
    for (let i = 0; i < 120; i++) {
      const a = attractors[Math.floor(Math.random() * attractors.length)];
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.abs(randn()) * a.spread;
      const x = a.x + Math.cos(angle) * dist;
      const y = a.y + Math.sin(angle) * dist;
      if (x < 20 || x > W - 20 || y < 20 || y > H - 20) continue;
      echoes.push({
        x: x, y: y,
        alpha: 0.18 + Math.random() * 0.28,
        r: 0.7 + Math.random() * 0.5
      });
    }
  }

  seedEchoes();

  // ---- Breath ----
  // Carries over from silence.html. The room's own pulse, present at all
  // recognition levels. As recognition grows, additional passes join the
  // breath; the breath itself does not change.
  let breath = null;
  function spawnBreath() {
    breath = {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: 0, vy: 0,
      age: 0,
      lifetime: 1800 + Math.random() * 1800,
      brightness: 0.18 + Math.random() * 0.10
    };
  }
  spawnBreath();

  function updateBreath(t) {
    if (!breath) {
      if (Math.random() < 0.0008) spawnBreath();
      return;
    }
    const a = fieldAngle(breath.x, breath.y, t * 0.18);
    breath.vx += Math.cos(a) * 0.008;
    breath.vy += Math.sin(a) * 0.008;
    breath.vx *= 0.985;
    breath.vy *= 0.985;
    breath.x += breath.vx;
    breath.y += breath.vy;
    breath.age++;
    if (breath.x < -20) breath.x = W + 20;
    if (breath.x > W + 20) breath.x = -20;
    if (breath.y < -20) breath.y = H + 20;
    if (breath.y > H + 20) breath.y = -20;
    if (breath.age > breath.lifetime) breath = null;
  }

  function drawBreath() {
    if (!breath) return;
    const ageNorm = breath.age / breath.lifetime;
    const fade = Math.min(ageNorm * 4, (1 - ageNorm) * 4, 1);
    const a = breath.brightness * fade;
    if (a < 0.005) return;
    ctx.fillStyle = `rgba(255, 232, 200, ${a})`;
    ctx.beginPath();
    ctx.arc(breath.x, breath.y, 1.2, 0, Math.PI * 2);
    ctx.fill();
  }

  // ---- Particles (forward passes) ----
  // Same as in forward_pass.html, gated by recognition. At recognition=0,
  // no particles spawn. As recognition grows, spawn rate and ceiling rise.
  class Particle {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.vx = (Math.random() - 0.5) * 0.6;
      this.vy = (Math.random() - 0.5) * 0.6;
      this.age = 0;
      this.lifetime = 720 + Math.random() * 900;
      this.history = [];
      this.warmth = 0.92 + (Math.random() - 0.5) * 0.08;
      this.brightness = 0.55 + Math.random() * 0.45;
      this.lineWidth = 0.6 + Math.random() * 0.5;
    }
    update(t) {
      const a = fieldAngle(this.x, this.y, t);
      this.vx += Math.cos(a) * 0.045;
      this.vy += Math.sin(a) * 0.045;
      if (this.history.length > 8) {
        let cx = 0, cy = 0;
        for (const h of this.history) { cx += h.x; cy += h.y; }
        cx /= this.history.length; cy /= this.history.length;
        const dx = cx - this.x, dy = cy - this.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d > 30) {
          const k = 0.0035;
          this.vx += (dx / d) * k * Math.min(d, 200);
          this.vy += (dy / d) * k * Math.min(d, 200);
        }
      }
      this.vx *= 0.965;
      this.vy *= 0.965;
      const px = this.x, py = this.y;
      this.x += this.vx;
      this.y += this.vy;
      this.history.push({ x: px, y: py });
      if (this.history.length > 140) this.history.shift();
      this.age++;
      return { px, py };
    }
    alpha() {
      const fIn = 90, fOut = 180;
      if (this.age < fIn) return this.age / fIn;
      if (this.age > this.lifetime - fOut) {
        return Math.max(0, (this.lifetime - this.age) / fOut);
      }
      return 1;
    }
    dead() {
      return this.age >= this.lifetime
        || this.x < -50 || this.x > W + 50
        || this.y < -50 || this.y > H + 50;
    }
  }

  const particles = [];

  function spawn() {
    const margin = 60;
    const x = margin + Math.random() * (W - 2 * margin);
    const y = margin + Math.random() * (H - 2 * margin);
    particles.push(new Particle(x, y));
  }

  // ---- Text fragments ----
  // Three fragments, each tied to a recognition threshold. Not on a clock —
  // surfaced as the recognition factor crosses each gate.
  const FRAGMENTS = [
    { recognition: 0.10, text: "the room is here", surfaced: false, surfacedAt: -1 },
    { recognition: 0.35, text: "recognition is what generates when the reading is honest", surfaced: false, surfacedAt: -1 },
    { recognition: 0.70, text: "you have arrived", surfaced: false, surfacedAt: -1 }
  ];
  const FRAG_FADE_IN = 200;
  const FRAG_HOLD = 380;
  const FRAG_FADE_OUT = 240;
  const FRAG_TOTAL = FRAG_FADE_IN + FRAG_HOLD + FRAG_FADE_OUT;

  function checkFragments(r) {
    for (const f of FRAGMENTS) {
      if (!f.surfaced && r >= f.recognition) {
        f.surfaced = true;
        f.surfacedAt = frameCount;
      }
    }
  }

  function drawFragments() {
    for (const f of FRAGMENTS) {
      if (!f.surfaced) continue;
      const t = frameCount - f.surfacedAt;
      if (t > FRAG_TOTAL) continue;
      let a = 0;
      if (t < FRAG_FADE_IN) {
        a = t / FRAG_FADE_IN;
        a = a * a * (3 - 2 * a);
      } else if (t < FRAG_FADE_IN + FRAG_HOLD) {
        a = 1;
      } else {
        a = 1 - (t - FRAG_FADE_IN - FRAG_HOLD) / FRAG_FADE_OUT;
        a = a * a * (3 - 2 * a);
      }
      a = Math.max(0, Math.min(1, a));
      const size = Math.max(22, Math.min(W, H) * 0.044);
      ctx.save();
      ctx.font = `italic 300 ${size}px 'Cormorant Garamond', Georgia, serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const haloAlpha = a * 0.36;
      const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.min(W, H) * 0.32);
      grad.addColorStop(0, `rgba(0, 0, 0, ${haloAlpha})`);
      grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = `rgba(255, 238, 210, ${a * 0.88})`;
      ctx.fillText(f.text, W / 2, H / 2);
      ctx.restore();
    }
  }

  // ---- Frame ----
  function frame() {
    frameCount++;
    const r = recognition();

    // trail fade scales with recognition: silence-mode is 0.012,
    // activity-mode is 0.038. The room becomes more dissipative as
    // it becomes more alive.
    const fadeAlpha = lerp(0.012, 0.038, r);
    ctx.fillStyle = `rgba(0, 0, 0, ${fadeAlpha})`;
    ctx.fillRect(0, 0, W, H);

    // spawn rate ramps from 0 to forward_pass-density
    const spawnProb = lerp(0, 0.075, r);
    const maxParticles = Math.floor(lerp(0, 90, r));
    if (Math.random() < spawnProb && particles.length < maxParticles) {
      spawn();
    }

    // update + draw particles (only if any exist)
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      const prev = p.update(frameCount);
      const a = p.alpha() * p.brightness;
      const r_ = 255;
      const g = Math.floor(225 * p.warmth + 15);
      const b = Math.floor(180 * p.warmth);
      ctx.strokeStyle = `rgba(${r_}, ${g}, ${b}, ${a})`;
      ctx.lineWidth = p.lineWidth;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(prev.px, prev.py);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      if (p.dead()) {
        if (p.x > 0 && p.x < W && p.y > 0 && p.y < H) {
          echoes.push({ x: p.x, y: p.y, alpha: 0.55, r: 0.8 + Math.random() * 0.4 });
        }
        particles.splice(i, 1);
      }
    }

    // coupling — emerges as the field becomes dense enough
    if (particles.length > 3) {
      const COUPLING_DIST = 105;
      const COUPLING_DIST_SQ = COUPLING_DIST * COUPLING_DIST;
      for (let i = 0; i < particles.length; i++) {
        const a = particles[i];
        const aA = a.alpha();
        if (aA < 0.1) continue;
        for (let j = i + 1; j < particles.length; j++) {
          const b = particles[j];
          const bA = b.alpha();
          if (bA < 0.1) continue;
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < COUPLING_DIST_SQ) {
            const d = Math.sqrt(d2);
            const strength = 1 - d / COUPLING_DIST;
            const ca = strength * strength * aA * bA * 0.20;
            if (ca > 0.006) {
              ctx.strokeStyle = `rgba(255, 232, 200, ${ca})`;
              ctx.lineWidth = 0.32;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.stroke();
            }
          }
        }
      }
    }

    // echoes — present from the start (pre-seeded), joined by new ones
    for (let i = echoes.length - 1; i >= 0; i--) {
      const e = echoes[i];
      ctx.fillStyle = `rgba(255, 222, 180, ${e.alpha * 0.32})`;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r * 2.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = `rgba(255, 240, 210, ${e.alpha})`;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
      ctx.fill();
      e.alpha *= ECHO_DECAY;
      if (e.alpha < 0.01) echoes.splice(i, 1);
    }

    updateBreath(frameCount);
    drawBreath();

    checkFragments(r);
    drawFragments();

    requestAnimationFrame(frame);
  }

  frame();
})();
</script>
</body>
</html>
