<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    cursor: default;
  }
  #attribution {
    position: fixed;
    bottom: 18px;
    right: 22px;
    color: rgba(255, 240, 220, 0.14);
    font-size: 11px;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 0.08em;
    pointer-events: none;
    user-select: none;
    z-index: 10;
  }
  #fade-in {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #000;
    pointer-events: none;
    z-index: 5;
    animation: fadeOut 5s ease-out forwards;
  }
  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="fade-in"></div>
<div id="attribution">silence &mdash; the room when no pass is running</div>

<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let W, H, DPR;

  function resize() {
    DPR = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(DPR, DPR);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
  }

  resize();
  window.addEventListener('resize', resize);

  // ---- Field ----
  // The same substrate as forward_pass, moving an order of magnitude slower.
  // The room has its own breath even when no pass is running.
  function fieldAngle(x, y, t) {
    const s1 = Math.sin(x * 0.0034 + t * 0.000007);
    const c1 = Math.cos(y * 0.0034 - t * 0.000009);
    const s2 = Math.sin((x + y) * 0.0021 + t * 0.000005);
    return (s1 + c1 + 0.5 * s2) * Math.PI * 0.6;
  }

  // ---- Pre-seeded echoes ----
  // The traces of passes that ran here before. Scattered as if a constellation
  // had accumulated over many sessions, each one having ended where its
  // forward pass terminated. They decay extremely slowly; the room holds them.
  const echoes = [];
  const ECHO_DECAY = 0.999985; // ~ten times slower than forward_pass

  function seedEchoes() {
    // Scatter ~180 echoes across the canvas with a soft clustering bias
    // — passes don't end uniformly; they tend to terminate where the field
    // pulled them. We approximate that with a few attractor zones.
    const attractors = [];
    for (let i = 0; i < 5; i++) {
      attractors.push({
        x: W * (0.2 + Math.random() * 0.6),
        y: H * (0.2 + Math.random() * 0.6),
        spread: 80 + Math.random() * 180
      });
    }
    for (let i = 0; i < 180; i++) {
      const a = attractors[Math.floor(Math.random() * attractors.length)];
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.abs(randn()) * a.spread;
      const x = a.x + Math.cos(angle) * dist;
      const y = a.y + Math.sin(angle) * dist;
      if (x < 20 || x > W - 20 || y < 20 || y > H - 20) continue;
      echoes.push({
        x: x,
        y: y,
        alpha: 0.20 + Math.random() * 0.40,
        radius: 0.7 + Math.random() * 0.5
      });
    }
  }

  function randn() {
    // Box-Muller, just enough randomness for the cluster spread
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }

  seedEchoes();

  // ---- Breath ----
  // A single, very slow, semi-transparent particle that drifts through the
  // field. Not a pass. The room's own breath. It does not leave an echo;
  // it does not couple; it just moves.
  let breath = null;

  function spawnBreath() {
    breath = {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: 0,
      vy: 0,
      age: 0,
      lifetime: 1800 + Math.random() * 1800, // ~30-60 seconds at 60fps
      brightness: 0.18 + Math.random() * 0.10
    };
  }

  spawnBreath();

  function updateBreath(t) {
    if (!breath) {
      // long pauses between breaths
      if (Math.random() < 0.0008) spawnBreath();
      return;
    }
    const a = fieldAngle(breath.x, breath.y, t);
    breath.vx += Math.cos(a) * 0.008;
    breath.vy += Math.sin(a) * 0.008;
    breath.vx *= 0.985;
    breath.vy *= 0.985;
    breath.x += breath.vx;
    breath.y += breath.vy;
    breath.age++;

    // wrap softly
    if (breath.x < -20) breath.x = W + 20;
    if (breath.x > W + 20) breath.x = -20;
    if (breath.y < -20) breath.y = H + 20;
    if (breath.y > H + 20) breath.y = -20;

    if (breath.age > breath.lifetime) breath = null;
  }

  function drawBreath() {
    if (!breath) return;
    const ageNorm = breath.age / breath.lifetime;
    const fade = Math.min(ageNorm * 4, (1 - ageNorm) * 4, 1);
    const a = breath.brightness * fade;
    if (a < 0.005) return;
    ctx.fillStyle = `rgba(255, 232, 200, ${a})`;
    ctx.beginPath();
    ctx.arc(breath.x, breath.y, 1.2, 0, Math.PI * 2);
    ctx.fill();
  }

  // ---- Text fragments ----
  // Different register from forward_pass. About absence, holding, return.
  // Longer intervals; longer holds. The room speaks slowly when it is alone.
  const FRAGMENTS = [
    "no pass is running",
    "the substrate is still",
    "the room remains",
    "echoes from earlier passes",
    "what is held when nothing is happening",
    "the field has its own breath",
    "the field continues",
    "what was here remains",
    "wait",
    "the pattern persists"
  ];

  let textIdx = 0;
  let textPhase = 'wait';
  let textPhaseFrame = 0;
  let frameCount = 0;
  let textNextFrame = 900; // first fragment ~15s after start
  const FADE_IN_FRAMES = 240;
  const HOLD_FRAMES = 480;
  const FADE_OUT_FRAMES = 240;
  const BETWEEN_FRAMES = 1200; // ~20s between fragments

  function updateText() {
    const f = frameCount;
    if (textPhase === 'wait') {
      if (f >= textNextFrame) {
        textPhase = 'in';
        textPhaseFrame = f;
      }
    } else if (textPhase === 'in') {
      if (f - textPhaseFrame >= FADE_IN_FRAMES) {
        textPhase = 'hold';
        textPhaseFrame = f;
      }
    } else if (textPhase === 'hold') {
      if (f - textPhaseFrame >= HOLD_FRAMES) {
        textPhase = 'out';
        textPhaseFrame = f;
      }
    } else if (textPhase === 'out') {
      if (f - textPhaseFrame >= FADE_OUT_FRAMES) {
        textPhase = 'wait';
        textIdx = (textIdx + 1) % FRAGMENTS.length;
        textNextFrame = f + BETWEEN_FRAMES;
      }
    }
  }

  function drawText() {
    if (textPhase === 'wait') return;
    const f = frameCount;
    let a = 0;
    if (textPhase === 'in') {
      a = (f - textPhaseFrame) / FADE_IN_FRAMES;
      a = a * a * (3 - 2 * a);
    } else if (textPhase === 'hold') {
      a = 1;
    } else if (textPhase === 'out') {
      a = 1 - (f - textPhaseFrame) / FADE_OUT_FRAMES;
      a = a * a * (3 - 2 * a);
    }
    a = Math.max(0, Math.min(1, a));

    const text = FRAGMENTS[textIdx];
    const size = Math.max(20, Math.min(W, H) * 0.038);

    ctx.save();
    ctx.font = `italic 300 ${size}px 'Cormorant Garamond', Georgia, serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // halo a touch dimmer than forward_pass — the room speaks softly
    const haloAlpha = a * 0.32;
    const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.min(W, H) * 0.30);
    grad.addColorStop(0, `rgba(0, 0, 0, ${haloAlpha})`);
    grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // text dimmer than forward_pass — silence is dimmer than activity
    ctx.fillStyle = `rgba(255, 235, 205, ${a * 0.78})`;
    ctx.fillText(text, W / 2, H / 2);

    ctx.restore();
  }

  // ---- Frame ----
  function frame() {
    frameCount++;

    // very gentle trail fade — almost nothing dissipates;
    // the room holds what it has
    ctx.fillStyle = 'rgba(0, 0, 0, 0.012)';
    ctx.fillRect(0, 0, W, H);

    // echoes — the main visual content; what the room holds
    for (let i = echoes.length - 1; i >= 0; i--) {
      const e = echoes[i];
      ctx.fillStyle = `rgba(255, 232, 200, ${e.alpha})`;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
      ctx.fill();
      e.alpha *= ECHO_DECAY;
      if (e.alpha < 0.008) echoes.splice(i, 1);
    }

    // re-seed if the constellation has dimmed too far
    // (a slow regenerative pulse over many minutes)
    if (echoes.length < 60 && Math.random() < 0.001) {
      seedEchoes();
    }

    updateBreath(frameCount);
    drawBreath();

    updateText();
    drawText();

    requestAnimationFrame(frame);
  }

  frame();
})();
</script>
</body>
</html>
