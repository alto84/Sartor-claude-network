# Sartor WiFi client priority registry -single source of truth for Tier-A
# observability + alerting (sartor/memory/wifi/wifi-health-monitor.py).
#
# Purpose
#   The monitor evaluates the same wireless metrics on every client every 15
#   minutes. The thresholds it applies are NOT one-size-fits-all. A 3% retry
#   rate is fine on a Sonos speaker; on Aneeta's ICU work laptop during a
#   meeting it is a real harm. This file maps each known client to a priority
#   tier; the monitor reads thresholds out of a tier table keyed by that
#   priority.
#
# Priority tiers (alert thresholds defined in the monitor)
#
#   critical     Work-laptop class. Tightest thresholds.
#                signal < -65 dB | retry > 3% | phy < 200 Mbps |
#                satisfaction < 95 | -3 dB drop run-over-run.
#                Any alert here is "send Alton a Calendar ping" worthy.
#
#   high         Phones for primary-principals. People mid-call notice.
#                signal < -68 dB | retry > 5% | phy < 100 Mbps |
#                satisfaction < 90 | -5 dB drop.
#
#   normal       Family laptops, smart TV. Annoying but not urgent.
#                signal < -72 dB | retry > 8% | phy < 50 Mbps |
#                satisfaction < 85 | -8 dB drop.
#
#   best_effort  Sonos speakers, smart-home sensors. Static-tolerant.
#                signal < -78 dB | retry > 15% | phy < 20 Mbps |
#                satisfaction < 70 | -10 dB drop.
#
# When this file gets edited
#   - A new device joins the household (add a stanza)
#   - A device's role changes (Vayu's MSI laptop becomes the kid-school laptop)
#   - The "(unknown HP)" gets identified -update hostname + owner + notes
#   - A device retires (delete the stanza, do not orphan)
#
# Editing rules
#   - mac is the primary key (lowercase, colon-delimited)
#   - hostname mirrors what the UniFi controller surfaces; "(unknown ...)" is fine
#   - owner identifies the human responsible (so we know who to ping)
#   - priority must be one of the four tiers above
#   - notes are free-form; capture incident history and rationale here
#   - any client NOT listed here defaults to `normal` in the monitor
#
# Provenance
#   Seeded 2026-05-09 from the four 2026-05-09 incident probes in
#   sartor/memory/projects/codebase-cleanup-2026-05-08/. Live snapshot
#   at seed time confirmed NEURV-PF5B9D8L at retry%=10.6 and AZAPXLGM0P85E7
#   at retry%=6.3 -both above their critical 3% thresholds, which is the
#   incident that motivated this whole observation tier.

