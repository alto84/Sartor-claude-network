# Approved vast.ai per-GPU on-demand list prices ($/GPU/hr).
#
# Source of truth for fleet-watchdog.py's price-drift check. The watchdog reads
# `listed_gpu_cost` from each machine's live vast.ai record and alerts (ORANGE)
# if it deviates from approved_gpu_cost beyond tolerance.
#
# WHY THIS EXISTS: on the 2026-05-28 rtxserver reboot, the listing price silently
# reverted from the approved $0.92/GPU to the $1.00/GPU default. Nothing noticed.
# This file makes the approved value explicit and machine-checkable.
#
# Editing rule: when Alton approves a price change, update approved_gpu_cost here
# in the SAME action that runs `vastai list machine`. The watchdog treating this
# file as truth means a stale entry will false-alarm — keep it current.

machines:
  124192:                      # rtxserver — dual RTX PRO 6000 Blackwell (2 GPUs)
    approved_gpu_cost: 0.92
    tolerance: 0.005
    note: "Approved 2026-05-26 (drop from $1.00). Reverted to $1.00 on 2026-05-28 reboot; re-pinned same day."
  52271:                       # gpuserver1 — RTX 5090 (1 GPU); reserved contract C.34113802
    approved_gpu_cost: 0.80
    tolerance: 0.005
    note: "List price $0.80/GPU; realized ~$0.20/hr under long-term reserved contract through 2026-08-24."
