      tolerance: 0.005
      dynamic:                         # reprice.py v3 band model — owns gpu_cost on this machine
        enabled: true
        comp_query: "gpu_name=RTX_PRO_6000_WS verified=true rentable=true"
        comp_num_gpus: 2
    monitoring:
      power_cap_w: 425                 # LIVE value (verified). Service file + docs say 450 — see VERIFICATION O1
      gpu_temp_alert_c: 84
