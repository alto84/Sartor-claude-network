# Solar Inference LLC — canonical fleet CONFIG (machine identity + listing + monitoring + tax posture).
#
# This file is VERSION-CONTROLLED. It holds NO dollar amounts (cost basis, revenue, balances).
# The privacy boundary (CLAUDE.md: "Financial data stays in data/financial/"):
#   - CONFIG (here, committed):      machine identity, listing spec, depreciation PARAMETERS, tax posture.
#   - DOLLARS (data/financial/, gitignored, local-only): cost basis, revenue, expenses, capital
#     accounts, books output. Cost basis is DERIVED from data/financial/solar-inference/expenses-2026.csv
#     (the capitalized purchase rows tagged to a machine) — never duplicated here.
#
# ONE source of truth for everything machine-keyed that is not pure network identity:
#   - Network identity (hostname / MAC / IP / role) lives in sartor/memory/machines/REGISTRY.yaml.
#   - Links to REGISTRY by `hostname` + `vast_ai_machine_id`.
#   - Supersedes business/approved-pricing.yaml (kept as a deprecated pointer; watchdog now reads THIS).
#
# Adding machine N+1 = copy a `- hostname:` stanza, fill the fields. Everything iterates over `machines`:
#   scripts/fleet/books.py        -> depreciation, ITC business-use fraction, balance sheet
#   scripts/fleet/vastai_pull.py  -> revenue + live state per machine
#   scripts/fleet/power_ingest.py -> kWh per machine (reads `power.logger`)
#   scripts/fleet/reconcile.py    -> live vast.ai state vs this file (drift)
#   scripts/fleet-watchdog.py     -> price / expiry / temp / floor / min_gpus checks
#   dashboard/family/             -> per-machine revenue + fleet health
#
# Editing rule: when Alton approves a price/listing change, update the `listing:` block here in the
# SAME action that runs `vastai list machine`. The watchdog treats this file as truth.
# Tax fields verified 2026-05-28: projects/fleet-ledger-2026-05-28/VERIFICATION.md (live IRS/OBBB/Notice 2025-42).

schema_version: "1.0"
updated: 2026-06-11
updated_by: "Rocinante Fable 5 (gpuserver2 vast.ai onboarding)"

solar:
  contract_total_usd: 438829          # public contract figure (in receipts); kept for the ITC denominator
  system_kw: 22.10
  annual_generation_kwh: 19854        # design estimate; ~82% offset of household load
  placed_in_service: null             # set when in service; gates the ITC/depreciation tax year
  begin_construction_locked: null     # date the 5% safe harbor is established (Notice 2025-42)
  itc_section: "48E"                  # Clean Electricity ITC; replaced §48 for PIS after 12/31/2024
  itc_rate: 0.30
  bonus_depreciation_pct: 100         # 2026, permanent under OBBB
  begin_construction_deadline: "2026-07-04"   # STATUTORY (OBBB + Notice 2025-42); a BEGIN-CONSTRUCTION date, NOT placed-in-service
  business_use_fraction: null         # the load-bearing unknown; MEASURED from power logs, never assumed
  note: >
    The §48E ITC and depreciable basis must be reduced to the BUSINESS-USE fraction. The plan's
    $131,649 (= 30% x full $438,829) is OVERSTATED (no business-use haircut). Defensible ~ $32K
    (GPU-only kWh ~24%) to ~$86K (dual-rig ~64%), possibly higher with net-metered grid-export income.
    §25D is dead for expenditures after 12/31/2025 (personal fraction gets zero credit). July 4 2026 is
    a begin-construction deadline; the 5% safe harbor (system <=1.5 MW) lets PIS slip to ~2029-2030 with
    full credit if construction begins by then. See matters/solar-itc-48-vs-25d.md.

electricity:
  nj_residential_usd_per_kwh: 0.18    # PSE&G approx; replace with metered utility-bill figure
  cooling_overhead_pct: 35            # summer AC multiplier on rig draw for the marginal floor

machines:
  - hostname: gpuserver1
    vast_ai_machine_id: 52271
    offer_id: 32099437
    role: rental                       # rental | household | mixed
    status: active                     # active | staged | retired
    gpus: 1
    gpu_model: "RTX 5090"
    hardware: "RTX 5090 32GB, i9-14900K, 128GB DDR5"
    asset:                             # depreciation PARAMETERS only; cost basis is in the expense ledger
      acquisition_date: "2025-09-22"   # RTX 5090 purchased 2025-09-22 (Amazon); components 2025-09-29 (Newegg). Per work/taxes/solar-inference-2025.md.
      in_service_date: "2026-04-05"    # first rental under C.34113802
      cost_basis_ref: "data/financial/solar-inference/expenses-2026.csv (capitalize rows, hostname=gpuserver1)"
      depreciation: {method: "MACRS-200DB", recovery_years: 5, bonus_eligible: true}
    power:
      idle_w: 80
      load_w: 550
      logger: "ssh:alton@gpuserver1:/home/alton/sartor-power/"   # power_ingest source (null if none)
    listing:
      gpu_cost: 0.80                   # $/GPU/hr on-demand list price (approved)
      min_bid: 0.65                    # interruptible floor
      storage_cost: 0.10               # $/GB-month
      min_gpus: 1
      end_date: "2026-06-30"           # live listing expiry (verified 2026-05-26)
      marginal_floor_gpu_cost: 0.14    # never list below (electricity); watchdog RED if breached
      tolerance: 0.005
      dynamic:                         # reprice.py v3 band model (Alton greenlit fleet-wide 2026-06-10)
        enabled: true
        start_date: "2026-08-24"       # C.34113802 ends; enrolling earlier would let contract hours
                                       # poison band learning. Controller takes over automatically.
        comp_query: "gpu_name=RTX_5090 verified=true rentable=true"
        comp_num_gpus: 1
    monitoring:
      gpu_temp_alert_c: 84
      gpu_temp_crit_c: 86
    note: >
      Realized ~$0.20/hr under long-term reserved contract C.34113802 through 2026-08-24 (a per-rental
      contract attribute, not a host-set rate). Listing expiry 2026-06-30 is a distinct field.

  - hostname: rtxserver
