                                       # is conservative (defers depreciation) — confirm the defensible date with JF.
      cost_basis_ref: "data/financial/solar-inference/expenses-2026.csv (capitalize rows, hostname=rtxserver)"
      depreciation: {method: "MACRS-200DB", recovery_years: 5, bonus_eligible: true}
    power:
      idle_w: 350
      load_w: 1250                     # 2x425W cap + ~350W host/CPU/board
      logger: null                     # NO logger installed — power_ingest flags this (ITC substantiation gap)
    listing:
