# Sartor machine REGISTRY -single source of truth for hostname / MAC / IP / role.
#
# Purpose
#   When a DHCP lease changes, a NIC swaps, a switch port moves, or a new peer
#   joins the fleet, this file is the one place that has to be updated. Tier 1
#   (hosts file + SSH config) and Tier 2 (codebase IP-literal sweep) both read
#   from here in spirit; Tier 4 (drift detector) reads from here at runtime.
#
# When this file gets edited
#   - A machine's IP changed (DHCP reassignment, static reconfig, VLAN move)
#   - A new peer joined the fleet (add a stanza)
#   - A NIC was swapped (MAC update)
#   - A machine retired (move to `retired:` block, do not delete)
#   - The drift detector wrote back `last_verified` (automatic, not manual)
#
# Who reads this
#   - check-registry.py (this directory) -drift detector cron
#   - future Tier 1 generator scripts that build hosts file + SSH config
#   - peer-coordinator agent and Rocinante operators looking for the canonical IP
#
# Editing rules
#   - hostname is the canonical short name; aliases capture historical / deployment names
#   - current_ip is the live value AS OF last_verified; treat as stale if older than 24h
#   - If you don't know a field with confidence, leave it `null` and add a `flagged:` note
#   - Bump `updated:` at top of file on any manual edit
#   - The drift detector writes back `last_verified` and `last_drift` only -never other fields
---
